<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Meyli</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Great+Vibes&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=3">
</head>
<body>

    <!-- Audio elements -->
    <audio id="audio-poema" src="poema.mp3" preload="auto"></audio>

    <!-- Fondos Fotorealistas Dinámicos -->
    <div id="bg-1" class="real-background active" style="background-image: url('assets/background.png');"></div>
    <div id="bg-2" class="real-background" style="background-image: url('assets/bg-forest.png');"></div>
    <div id="bg-3" class="real-background" style="background-image: url('assets/bg-sunrise.png');"></div>
    <!-- Escena Final Poética (Pergamino) -->
    <div id="bg-4" class="real-background" style="background-image: url('assets/bg-parchment.png');"></div>
    
    <div id="water-overlay"></div> <!-- Para simular profundidad y oscuridad mágica -->

    <!-- Final Poético Manuscrito -->
    <div id="handwritten-finale">
        <div class="handwritten-text">Para siempre, tuyo.</div>
    </div>

    <!-- Contenedor para los faroles y partículas mágicas -->
    <div id="lanterns-container"></div>

    <!-- UI Overlay -->
    <div id="ui-layer">
        
        <!-- Pantalla de inicio (Sobre 100% CSS Programado) -->
        <div id="start-screen" class="active">
            <div class="letter-scene" id="letter-scene">
                <!-- Polvo de Hadas Container -->
                <div id="fairy-dust-container"></div>
                
                <div class="css-envelope-wrapper" id="envelope-btn">
                    <div class="css-envelope">
                        <!-- Parte Trasera y Detalles de Envío -->
                        <div class="css-envelope-back">
                            <div class="css-stamp"></div>
                            <div class="css-postmark"></div>
                        </div>
                        
                        <!-- La Carta Plegada 3D Extraíble -->
                        <div id="folded-parchment" class="folded-parchment">
                            <div class="fold fold-top"></div>
                            <div class="fold fold-center">
                                <div class="card-border-inner">
                                    <div class="live-writing-container" id="live-writing-container">
                                        <span class="live-writing-text">Meyli</span>
                                    </div>
                                </div>
                            </div>
                            <div class="fold fold-bottom"></div>
                        </div>
                        
                        <!-- Solapas Delanteras (Abajo y Lados) -->
                        <div class="css-envelope-front"></div>
                        
                        <!-- Solapa Superior -->
                        <div class="css-envelope-flap"></div>
                        
                        <!-- Sello de Cera Rojo -->
                        <div class="css-wax-seal">
                            <span class="seal-inner">❤</span>
                        </div>
                    </div>
                    <p class="ribbon-text" id="ribbon-txt">Rompe el sello para abrir la carta ✨</p>
                </div>
            </div>
        </div>

        <!-- Pantalla de la experiencia (Poesía Mágica) -->
        <div id="experience-screen">
            <div id="magic-text" class="magic-text"></div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>

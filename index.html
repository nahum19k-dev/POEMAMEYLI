<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Meyli</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Great+Vibes&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Audio elements -->
    <audio id="audio-poema" src="poema.mp3" preload="auto"></audio>

    <!-- Fondo Fotorealista -->
    <div id="real-background"></div>
    <div id="water-overlay"></div> <!-- Para simular movimiento en el agua -->

    <!-- Contenedor para los faroles fotorealistas -->
    <div id="lanterns-container"></div>

    <!-- UI Overlay -->
    <div id="ui-layer">
        
        <!-- Pantalla de inicio (La Carta) -->
        <div id="start-screen" class="active">
            <div class="envelope-wrapper" id="envelope-btn">
                <div class="envelope">
                    <div class="letter">
                        <h1 class="title-letter">Para Meyli</h1>
                        <p class="subtitle-letter">Toca para abrir ✨</p>
                    </div>
                    <div class="envelope-back"></div>
                    <div class="envelope-body"></div>
                    <div class="flap"></div>
                    <div class="wax-seal"></div>
                </div>
            </div>
        </div>

        <!-- Pantalla de la experiencia (Subtítulos mágicos) -->
        <div id="experience-screen">
            <div id="magic-text" class="magic-text"></div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>

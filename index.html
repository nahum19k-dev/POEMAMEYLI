<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Meyli</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Great+Vibes&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Audio elements -->
    <audio id="audio-poema" src="poema.mp3" preload="auto"></audio>

    <!-- Fondo Fotorealista -->
    <div id="real-background"></div>
    <div id="water-overlay"></div> <!-- Para simular movimiento en el agua -->

    <!-- Contenedor para los faroles fotorealistas -->
    <div id="lanterns-container"></div>

    <!-- UI Overlay -->
    <div id="ui-layer">
        
        <!-- Pantalla de inicio -->
        <div id="start-screen" class="active">
            <h1 class="title">Para Meyli...</h1>
            <p class="subtitle">Ponte los audífonos, sube el volumen y cierra los ojos un segundo...</p>
            <button id="start-btn">Escuchar mi voz ✨</button>
        </div>

        <!-- Pantalla de la experiencia (Subtítulos mágicos) -->
        <div id="experience-screen">
            <div id="magic-text" class="magic-text"></div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
